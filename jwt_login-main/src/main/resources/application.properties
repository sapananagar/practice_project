# ================================
# Server
# ================================
server.port=8080

# ================================
# PostgreSQL Database
# ================================
spring.datasource.url=jdbc:postgresql://localhost:5432/project
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# create-drop = wipe & recreate tables on every restart (dev only!)
# update      = only adds new columns/tables, never deletes (safe for dev)
# validate    = checks schema matches entities, never changes DB (pre-prod)
# none        = hands-off, use when Flyway/Liquibase manages migrations (prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================================
# JWT Configuration
# ================================
# IMPORTANT: Change this secret before production!
# Generate a strong one with: openssl rand -base64 64
jwt.secret=bXlWZXJ5U2VjcmV0SndrZXlGb3JEZXZlbG9wbWVudE9ubHkxMjM0NTY3ODkw
# Access token: 15 minutes (15 * 60 * 1000 ms)
jwt.access-token-expiry=900000
# Refresh token: 7 days (7 * 24 * 60 * 60 * 1000 ms)
jwt.refresh-token-expiry=604800000
